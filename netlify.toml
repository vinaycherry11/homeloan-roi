[build]
  publish = "frontend"
  functions = "netlify/functions"

# ── HTTP headers ──────────────────────────────────────────────────────────────
# Cache static assets (JS/CSS) for 1 year — improves Core Web Vitals score
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache HTML for 1 hour
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Sitemap and robots content-type
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Rewrite /api/* → Netlify Functions so the frontend code needs no changes
[[redirects]]
  from = "/api/calculate"
  to = "/.netlify/functions/calculate"
  status = 200

[[redirects]]
  from = "/api/sensitivity"
  to = "/.netlify/functions/sensitivity"
  status = 200

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/locality"
  to = "/.netlify/functions/locality"
  status = 200

# Static assets
[[redirects]]
  from = "/static/*"
  to = "/static/:splat"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
